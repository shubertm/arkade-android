name: Build

on:
  workflow_call:

jobs:
  build:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    needs: [lint, ktlint]
    runs-on: ubuntu-latest
    environment: Development
    steps:
      - uses: actions/checkout@v6

      - name: Set Up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build Artifacts
        run: ./gradlew build

      - name: Upload AAR
        uses: actions/upload-artifact@v7
        with:
          name: arkade-android
          path: ./arkade/build/outputs/aar/*.aar
          if-no-files-found: error

      - name: Upload JAR
        uses: actions/upload-artifact@v7
        with:
          name: arkade-jvm
          path: ./arkade/build/libs/arkade.jar
          if-no-files-found: error

  lint:
    environment: Development
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run linter
        run: ./gradlew lint

      - uses: actions/upload-artifact@v7
        with:
          name: lint-results
          path: ./arkade/build/reports/*.html

  ktlint:
    environment: Development
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Kotlin linter
        run: ./gradlew ktlintCheck
