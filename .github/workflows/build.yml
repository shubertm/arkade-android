name: Build

on: [push]

jobs:
  build:
    needs: [lint, ktlint]
    runs-on: ubuntu-latest
    environment: Development
    steps:
      - uses: actions/checkout@v6

      - name: Set Up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build Debug AAR
        run: ./gradlew ark-core:assembleDebug

      - name: Build Release AAR
        run: ./gradlew ark-core:assembleRelease

      - name: Upload Debug AAR
        uses: actions/upload-artifact@v7
        with:
          name: ark-core-debug
          path: ./ark-core/build/outputs/aar/*-debug.aar

      - name: Upload Release AAR
        uses: actions/upload-artifact@v7
        with:
          name: ark-core-release
          path: ./ark-core/build/outputs/aar/*-release.aar

  lint:
    environment: Development
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run linter
        run: ./gradlew lint

      - uses: actions/upload-artifact@v7
        with:
          name: lint-results
          path: ./ark-core/build/reports/*.html

  ktlint:
    environment: Development
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Kotlin linter
        run: ./gradlew ktlintCheck
