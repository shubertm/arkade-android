name: Unit Tests

on:
 workflow_call:
   
jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run linter
        run: ./gradlew lint --no-daemon

      - name: Run Unit Tests
        run: ./gradlew testUnit
