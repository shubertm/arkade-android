name: E2E Test

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Run linter
        run: ./gradlew lint --no-daemon

      - name: Run Unit Tests
        run: ./gradlew :arkade:cleanJvmTest :arkade:jvmTest --tests "com.arkade.core.*" --no-daemon

      - name: Run Nigiri
        uses: vulpemventures/nigiri-github-action@v1
        with:
          use_liquid: false
          use_ln: false

      - name: Build Docker Images
        run: ./gradlew buildDocker --no-daemon

      - name: Setup Docker Images
        run: ./gradlew testUpDocker --no-daemon

      - name: Setup Regtest
        run: ./gradlew testSetup --no-daemon

      - name: Run E2E Tests
        run: ./gradlew testE2EDocker --no-daemon

      - name: Take Down Docker Images
        run: ./gradlew testDownDocker --no-daemon

      - name: Capture arkd logs
        if: failure()
        run: |
          docker logs arkd > arkd.log || true
          if [ -f arkd.log ]; then
            echo "=== arkd logs ==="
            cat arkd.log
          fi

