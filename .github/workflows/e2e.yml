name: E2E Tests

on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run linter
        run: ./gradlew lint --no-daemon

      - name: Run Nigiri
        uses: vulpemventures/nigiri-github-action@v1
        with:
          use_liquid: false
          use_ln: false

      - name: Build Docker Images
        run: ./gradlew buildDocker --no-daemon

      - name: Run E2E Tests
        run: ./gradlew testE2EDocker --no-daemon

      - name: Capture arkd logs
        if: failure()
        run: |
          docker logs arkd > arkd.log || true
          if [ -f arkd.log ]; then
            echo "=== arkd logs ==="
            cat arkd.log
          fi

